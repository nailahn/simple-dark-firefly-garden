<style>

<body class="bg-background select-none touch-none">
<div class="fixed inset-0 bg-gradient-to-b from-surface-container-lowest via-surface to-background opacity-90 pointer-events-none"></div>
<div class="fixed inset-0 overflow-hidden pointer-events-none opacity-40">
<div class="absolute -top-20 -left-20 w-[600px] h-[600px] bg-secondary-container/20 rounded-full blur-[120px]"></div>
<div class="absolute top-1/4 -right-40 w-[800px] h-[800px] bg-primary-container/10 rounded-full blur-[150px]"></div>
<div class="absolute -bottom-40 left-1/3 w-[900px] h-[700px] bg-on-tertiary-container/5 rounded-full blur-[180px]"></div>
</div>
<div class="foliage-mask"></div>
<canvas class="relative z-10" id="fireflyCanvas"></canvas>
<div class="misty-overlay z-20"></div>
<script>
        const canvas = document.getElementById('fireflyCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let fireflies = [];
        const fireflyCount = 180;
        const mouse = { x: -1000, y: -1000, active: false };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Firefly {
            constructor() {
                this.init();
            }

            init() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.8;
                this.vy = (Math.random() - 0.5) * 0.8;
                this.size = Math.random() * 1.8 + 0.6;
                this.baseAlpha = Math.random() * 0.5 + 0.3;
                this.alpha = this.baseAlpha;
                this.angle = Math.random() * Math.PI * 2;
                this.angularVelocity = (Math.random() - 0.5) * 0.02;
                this.hue = Math.random() > 0.8 ? 65 : 78; // Variation between yellow-green and lime
                this.flickerSpeed = 0.02 + Math.random() * 0.05;
                this.flickerPhase = Math.random() * Math.PI * 2;
                this.trail = [];
                this.maxTrail = 12 + Math.floor(Math.random() * 10);
                this.glowSize = this.size * (15 + Math.random() * 10);
            }

            update() {
                // Subtle random movement
                this.angle += this.angularVelocity;
                this.vx += Math.cos(this.angle) * 0.01;
                this.vy += Math.sin(this.angle) * 0.01;

                // Speed limit
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > 1.2) {
                    this.vx *= 0.95;
                    this.vy *= 0.95;
                }

                // Mouse interaction
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const interactionRadius = 180;

                if (dist < interactionRadius) {
                    const force = (interactionRadius - dist) / interactionRadius;
                    const angle = Math.atan2(dy, dx);
                    
                    // Scatter away
                    this.vx -= Math.cos(angle) * force * 0.8;
                    this.vy -= Math.sin(angle) * force * 0.8;
                    
                    // Brighten up
                    this.alpha = Math.min(1, this.alpha + force * 0.2);
                    this.glowSize = this.size * (25 + force * 20);
                } else {
                    this.alpha += (this.baseAlpha - this.alpha) * 0.05;
                    this.glowSize += (this.size * 18 - this.glowSize) * 0.05;
                }

                this.x += this.vx;
                this.y += this.vy;

                // Seamless wrapping with buffer
                const buffer = 50;
                if (this.x < -buffer) this.x = width + buffer;
                if (this.x > width + buffer) this.x = -buffer;
                if (this.y < -buffer) this.y = height + buffer;
                if (this.y > height + buffer) this.y = -buffer;

                // Handle trail
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > this.maxTrail) {
                    this.trail.shift();
                }

                // Flicker effect
                this.flickerPhase += this.flickerSpeed;
            }

            draw() {
                const flickerAlpha = this.alpha * (0.8 + Math.sin(this.flickerPhase) * 0.2);
                
                // Draw Trail (Misty/Watercolor effect)
                if (this.trail.length > 1) {
                    ctx.beginPath();
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);
                    for (let i = 1; i < this.trail.length; i++) {
                        ctx.lineTo(this.trail[i].x, this.trail[i].y);
                    }
                    ctx.strokeStyle = `hsla(${this.hue}, 80%, 70%, ${flickerAlpha * 0.15})`;
                    ctx.lineWidth = this.size;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.stroke();
                }

                // Draw Outer Glow (Bioluminescent Bloom)
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.glowSize);
                gradient.addColorStop(0, `hsla(${this.hue}, 90%, 65%, ${flickerAlpha * 0.4})`);
                gradient.addColorStop(0.4, `hsla(${this.hue}, 80%, 60%, ${flickerAlpha * 0.1})`);
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.glowSize, 0, Math.PI * 2);
                ctx.fill();

                // Draw Core (The Firefly)
                ctx.fillStyle = `hsla(${this.hue}, 95%, 85%, ${flickerAlpha})`;
                ctx.beginPath();
                // Irregular organic shape instead of perfect circle
                const r = this.size + Math.sin(this.flickerPhase * 2) * 0.2;
                ctx.ellipse(this.x, this.y, r, r * 0.8, this.angle, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < fireflyCount; i++) {
            fireflies.push(new Firefly());
        }

        function animate() {
            // Slight trails on canvas clear for watercolor feel
            ctx.fillStyle = 'rgba(16, 20, 26, 0.15)';
            ctx.fillRect(0, 0, width, height);

            fireflies.forEach(firefly => {
                firefly.update();
                firefly.draw();
            });

            // Subtle mouse light
            if (mouse.active) {
                const grad = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 100);
                grad.addColorStop(0, 'rgba(189, 194, 255, 0.05)');
                grad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(mouse.x, mouse.y, 100, 0, Math.PI * 2);
                ctx.fill();
            }

            requestAnimationFrame(animate);
        }

        const handleMove = (e) => {
            mouse.active = true;
            if (e.touches) {
                mouse.x = e.touches[0].clientX;
                mouse.y = e.touches[0].clientY;
            } else {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            }
        };

        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchstart', handleMove);
        window.addEventListener('touchmove', handleMove);
        window.addEventListener('touchend', () => mouse.active = false);
        window.addEventListener('mouseleave', () => mouse.active = false);

        animate();
    </script>
